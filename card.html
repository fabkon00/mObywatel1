<!DOCTYPE html>
<html>
<head>
    <title>mObywatel</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="assets/card.css?v=1.0">
    <link rel="stylesheet" href="assets/main.css">
    <meta name="viewport" content="width=device-width, initial-scale=0.8, user-scalable=no">
</head>
<body>
    <!-- Tu zachowujemy całą Twoją strukturę top_grid i confirm -->
    <div class="top_grid">
        <div class="action_grid">
            <img src="https://i.imgur.com/kGtmBD0.png" class="back_img">
            <p onclick="sendTo('home')" class="back_text" style="cursor:pointer;">Wróć</p>
        </div>
        <p class="title_text">mDowód</p>
        <img src="https://i.imgur.com/7MlyqbI.png" class="help_img">
    </div>

    <!-- (Reszta Twojego kodu confirm pozostaje bez zmian...) -->

    <div class="id_image_data">
        <img draggable="false" class="id_image" src="https://i.imgur.com/8ieHfVK.png">
        <div class="inset"></div>
        
        <!-- POPRAWKA: Usunięto link do obrazka, dodano id -->
        <div class="id_own_image" id="photo_display"></div>
        
         <img src="https://i.imgur.com/sW5KVOE.gif" class="flag_video">
         <img src="https://i.imgur.com/9ipf8YT.gif" class="eagle_video">
        
        <div class="id_data_grid">
            <!-- (Twoje pola danych: name, surname, pesel itd.) -->
            <div class="data_holder"><p class="data_title" id="name"></p><p class="data_value">Imię (imiona)</p></div>
            <div class="data_holder"><p class="data_title" id="surname"></p><p class="data_value">Nazwisko</p></div>
            <div class="data_holder"><p class="data_title" id="nationality"></p><p class="data_value">Obywatelstwo</p></div>
            <div class="data_holder"><p class="data_title" id="birthday"></p><p class="data_value">Data urodzenia</p></div>
            <div class="data_holder"><p class="data_title" id="pesel"></p><p class="data_value">Numer PESEL</p></div>
        </div>
    </div>

    <!-- (Dalsza część Twojego kodu bar.js, card.js na końcu...) -->
    <script src="assets/bar.js"></script>
    <script src="assets/card.js"></script>
</body>
</html>
